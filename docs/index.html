<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>synflexiple</title>
  <style>
    :root {
      --color-base-100: oklch(9% 0.00 90);
      --color-base-200: oklch(15.4% 0 56.043);
      --color-base-300: oklch(24% 0.00 90);
      --color-base-content: oklch(92% 0.003 48.717);
      --color-primary: oklch(41% 0.14 257);
      --color-secondary: oklch(34.5% 0.163 344.600);
      --color-error: oklch(50% 0.213 27.518);

      font-size: 20px;
    }
    html {
      background-color: var(--color-base-300);
      touch-action: manipulation;
    }
    body {
      display: flex;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #scrollbarZone {
      width: 60px;
      overflow-y: scroll;
    }
    #scrollbarZone > div {
      width: 1px;
    }
    #bottomOptions {
      position: absolute;
      bottom: 10px;
      left: 40px;
      z-index: 10;
    }
    #scaleSelect {
      font-size: 0.9em;
      padding: 2px;
    }
    #padContainer {
      flex: 1;
      position: relative;
      overflow: hidden;
      height: 100%;
    }
    .noteOverlay {
      position: absolute;
      width: 100%;
      display: flex;
      flex-direction: column-reverse;
      pointer-events: none;
      z-index: 0;
      transform: translateY(0px);
    }
    .octave-row {
      flex: none;
      display: flex;
      border-top: solid 1px;
      border-bottom: solid 1px;
      height: var(--rowHeight);
    }
    .note-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.8em;
      color: white;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .pad {
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      z-index: 1;
    }

    /* SETTINGS UI [ */
    [id=settings] {
      display: flex;
      flex-flow: column wrap;
      gap: 1.25rem;
      padding: 0.75rem;
      border-radius: 0;
      width: 100;
      color: var(--color-base-content);
      background-color: var(--color-base-300);

      * {
        border-radius: 0.25rem;
      }

      input {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: none;
        background-color: transparent;
        box-shadow: none;
        font-family: inherit;
        font-size: 100%;
        font-weight: bold;
        color: inherit;
        width: 100;
      }
      input:focus {
        outline: none;
        color: var(--color-base-300);
        background-color: var(--color-base-content);
      }

      label {
        display: flex;
        flex-flow: column wrap;
      }

      button {
        font-size: 1rem;
        height: 2.5rem;
        color: var(--color-base-content);
        background-color: var(--color-base-300);
      }
    }

    #settingsHeader {
      display: flex;
      flex-flow: column wrap;
      background-color: var(--color-primary);
      padding: 0.5rem;
    }

    #settingsHeading {
      margin: 0;
      padding: 0.25rem;
      text-align: center;
    }

    #settingsHeaderButtons {
      display: flex;
      flex-flow: row wrap;
      justify-content: space-around;
    }

    .a_setting {
      background-color: var(--color-secondary);
    }

    .setting-header {
      display: flex;
      flex-flow: row wrap;
      gap: 1.25rem;
      align-items: center;
      height: 3rem;

      & > * {
        margin: 0;
      }
    }
    #settingsHeader,
    .setting-header {
      a, label {
        user-select: none;
        background-color: var(--color-base-300);
        color: var(--color-base-content);
        padding: 0.25rem;
        height: min-content;
        width: fit-content;
        border: 2px outset;
        border-color: var(--color-base-content);
      }
      a:hover,
      label:hover {
        background-color: var(--color-base-200);
      }
      a:active,
      label:active {
        border-style: inset;
        background-color: var(--color-base-100);
      }
      input[type="file"] {
        position: absolute;
        width: 0;
        height: 0;
      }
    }

    .setting-name {
      padding: 0.5rem;
      align-self: flex-start;
    }

    .setting-contents {
      display: flex;
      flex-flow: column wrap;
      padding: 0.5rem;
      gap: 0.75rem;
    }

    .setting-content {
      display: flex;
      flex-flow: column wrap;
      gap: 0.25rem;
      padding: 0.25rem;
      background-color: var(--color-primary);
    }

    .setting-content-delete {
      background-color: var(--color-error) !important;
    }

    #settingsDialog {
      z-index: 20;
      margin: 0;
      padding: 0;
      border: none;
      width: 50%;
    }
    #settingsDialogClose {
      width: 2rem;
      padding: 0.25rem;
      position: fixed;
      border: none;
      border-radius: 0;
    }
    /* ] */
  </style>
</head>
<body>
  <div id="scrollbarZone"></div>
  <div id="bottomOptions">
    <select id="scaleSelect">
    </select>
    <button id="settingsDialogShow">
      ⚙️
    </button>
  </div>
  <dialog id="settingsDialog">
    <button id="settingsDialogClose">
      💾
    </button>
    <div id="settings">
      <div id="settingsHeader">
        <h2 id="settingsHeading">Settings<hr></h2>
        <div id="settingsHeaderButtons">
          <a id="exportAll">Export all</a>
          <div>
            <label for="importAll">Import all</label>
            <input type="file" id="importAll">
          </div>
        </div>
      </div>

      <div class="a_setting">
        <div class="setting-header">
          <h4 class="setting-name">Basic Settings</h4>
          <a>Export</a>
          <div>
            <label for="">Import</label>
            <input type="file" id="">
          </div>
        </div>
        <div class="setting-contents">
          <div class="setting-content" id="basicSettingsInputs">
            <label>
              Base frequency:
              <input type="number" id="baseFreqInput">
            </label>
            <label>
              Base octave:
              <input type="number" id="baseOctaveInput">
            <label>
              Number of octaves:
              <input type="number" id="numOctavesInput">
            </label>
          </div>
        </div>
      </div>

      <div class="a_setting">
        <div class="setting-header">
          <h4 class="setting-name">Scales Presets</h4>
          <a>Export</a>
          <div>
            <label for="">Import</label>
            <input type="file" id="">
          </div>
        </div>
        <div class="setting-contents">
          <button id="scalePresetsReset">Reset</button>
          <button id="scalePresetsAdd">➕</button>
        </div>
      </div>
    </div>
  </dialog>

  <div id="padContainer"></div>

  <script>
    const dialogDebug = false;

    /// CONFIGS DEFAULTS [
    const cfg = {}; // cfg stands for "configs"

    // scalePresets
    cfg.scalePresets = JSON.parse(localStorage.getItem("cfg.scalePresets")) || {
      Minor: {
        tones: [0, 2, 3, 5, 7, 8, 10],
      },
      Minor_Ratio: {
        tones: [1/1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5],
        notation: "ratio",
        displayName: "Minor Ratio",
      },
    };

    // Basics
    cfg.baseFreq = parseFloat(localStorage.getItem("cfg.baseFreq")) || 261.63;
    cfg.baseOctave = (!isNaN(parseInt(localStorage.getItem("cfg.baseOctave")))) ? parseInt(localStorage.getItem("cfg.baseOctave")) : -1;
    cfg.numOctaves = parseInt(localStorage.getItem("cfg.numOctaves")) || 4;

    // UI
    cfg.ui = {};
    cfg.ui.rowHeight = 120;
    document.documentElement.style.setProperty("--rowHeight", cfg.ui.rowHeight + "px");
    /// ]

    const container = document.getElementById("padContainer");
    const scaleSelect = document.getElementById("scaleSelect");
    const scrollbarZone = document.getElementById("scrollbarZone");

    function getFreqFromXY(x, y, width, height, ET, scale, minOct, maxOct) {
      const octaveHeight = height / (maxOct - minOct + 1);
      const octaveIndex = maxOct - Math.floor(y / octaveHeight);
      const octaveY = y % octaveHeight;
      const yVolume = 1 - (octaveY / octaveHeight);

      const index = Math.floor(x / width * scale.length);
      const safeIndex = Math.max(0, Math.min(index, scale.length - 1));
      const ratio = (ET === "r" || ET === "ratio") ? scale[safeIndex] : Math.pow(2, scale[safeIndex] / ET);
      const freq = cfg.baseFreq * ratio * Math.pow(2, octaveIndex);
      return { freq: freq, volume: yVolume };
    }

    function applyEnvelope(gainNode, audioCtx, volume, attack = 0.05, decay = 0.1, sustain = 0.7, release = 0.9) {
      const now = audioCtx.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(volume, now + attack);
      gainNode.gain.linearRampToValueAtTime(volume * sustain, now + attack + decay);
      return () => {
        const stopTime = audioCtx.currentTime;
        gainNode.gain.cancelScheduledValues(stopTime);
        gainNode.gain.setValueAtTime(gainNode.gain.value, stopTime);
        gainNode.gain.linearRampToValueAtTime(0, stopTime + release);
      };
    }

    function generateImpulseResponse(audioCtx, duration = 0.01, decay = 0.01) {
      const rate = audioCtx.sampleRate;
      const length = rate * duration;
      const impulse = audioCtx.createBuffer(2, length, rate);
      for (let ch = 0; ch < 2; ch++) {
        const channelData = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
        }
      }
      return impulse;
    }

    function renderPad(scaleName) {
      const ET = (cfg.scalePresets[scaleName].notation !== undefined) ? cfg.scalePresets[scaleName].notation : 12;
      const scale = cfg.scalePresets[scaleName].tones;
      container.innerHTML = "";

      const pad = document.createElement("div");
      pad.className = "pad";

      const overlay = document.createElement("div");
      overlay.className = "noteOverlay";

      for (let o = 0; o < cfg.numOctaves; o++) {
        const octaveRow = document.createElement("div");
        octaveRow.className = "octave-row";
        for (let i = 0; i < scale.length; i++) {
          const note = document.createElement("div");
          note.className = "note-zone";
          const tone = scale[i];
          const hue = (ET === "r" || ET === "ratio") ? tone * 360 : (tone / ET) * 360;
          note.style.backgroundColor = `hsl(${hue}, 70%, 55%)`;
          note.textContent = +tone.toFixed(3);
          octaveRow.appendChild(note);
        }
        overlay.appendChild(octaveRow);
      }

      overlay.style.transform = "translateY(0px)";
      container.appendChild(overlay);
      container.appendChild(pad);

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const reverb = audioCtx.createConvolver();
      reverb.buffer = generateImpulseResponse(audioCtx);
      reverb.normalize = true;

      const masterGain = audioCtx.createGain();
      masterGain.gain.value = 25;

      masterGain.connect(reverb);
      reverb.connect(audioCtx.destination);

      const activeVoices = new Map();

      pad.addEventListener("pointerdown", e => {
        audioCtx.resume();
        const id = e.pointerId;
        const rect = pad.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top + scrollbarZone.scrollTop;
        const { freq, volume } = getFreqFromXY(x, y, rect.width, cfg.ui.rowHeight * cfg.numOctaves, ET, scale, cfg.baseOctave, cfg.baseOctave + cfg.numOctaves - 1);

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(500 + y * 4, audioCtx.currentTime);

        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.value = 0;
        lfoGain.gain.value = 1;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);

        osc.start();
        lfo.start();

        const release = applyEnvelope(gain, audioCtx, volume);
        activeVoices.set(id, { osc, gain, lfo, release });
      });

      pad.addEventListener("pointerup", e => {
        const id = e.pointerId;
        const voice = activeVoices.get(id);
        if (voice) {
          voice.release();
          voice.osc.stop(audioCtx.currentTime + 1);
          voice.lfo.stop(audioCtx.currentTime + 1);
          activeVoices.delete(id);
        }
      });

      pad.addEventListener("pointermove", e => {
        const id = e.pointerId;
        const voice = activeVoices.get(id);
        if (voice && e.pressure > 0) {
          const rect = pad.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top + scrollbarZone.scrollTop;
          const { freq, volume } = getFreqFromXY(x, y, rect.width, cfg.ui.rowHeight * cfg.numOctaves, ET, scale, cfg.baseOctave, cfg.baseOctave + cfg.numOctaves - 1);
          voice.osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          voice.gain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05);
        }
      });
    }

    scrollbarZone.innerHTML = '<div style="height:' + (cfg.ui.rowHeight * cfg.numOctaves) + 'px;"></div>';
    scrollbarZone.addEventListener("scroll", () => {
      const scrollY = scrollbarZone.scrollTop;
      const overlay = container.querySelector(".noteOverlay");
      if (overlay) overlay.style.transform = `translateY(${-scrollY}px)`;
    });

    scaleSelect.addEventListener("change", () => {
      renderPad(scaleSelect.value);
    });

    function scaleOptionsGenerate() {
      for (const [key, value] of Object.entries(cfg.scalePresets)) {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = value.displayName || key;
        scaleSelect.append(option);
      }
    }

    scaleOptionsGenerate();
    renderPad(scaleSelect.options[0].value);

    /// SETTINGS [

    // Get elements [
    const settingsDialog = document.getElementById("settingsDialog");
    const settingsDialogShow = document.getElementById("settingsDialogShow");
    const settingsDialogClose = document.getElementById("settingsDialogClose");

    const basicSettingsInputs = document.getElementById("basicSettingsInputs");
    const baseFreqInput = document.getElementById("baseFreqInput");
    const baseOctaveInput = document.getElementById("baseOctaveInput");
    const numOctavesInput = document.getElementById("numOctavesInput");

    const scalePresetsReset = document.getElementById("scalePresetsReset");
    const scalePresetsAdd = document.getElementById("scalePresetsAdd");

    const exportAll = document.getElementById("exportAll");
    const importAll = document.getElementById("importAll");
    // ]

    // Dialog show/close buttons [
    settingsDialogShow.addEventListener("click", () => {
      if (!dialogDebug) {
        settingsDialog.showModal();
      } else {
        settingsDialog.show();
      }
    });

    settingsDialogClose.addEventListener("click", () => {
      settingsDialog.close();
    });
    // ]
    if (dialogDebug) {
      settingsDialog.setAttribute("closedby", "closerequest");
    } else {
      settingsDialog.setAttribute("closedby", "any");
    }

    baseFreqInput.value = cfg.baseFreq;
    baseOctaveInput.value = cfg.baseOctave;
    numOctavesInput.value = cfg.numOctaves;

    // scalePresetInputs [
    function scalePresetInputsGenerate({
      sDNValue = "",
      sIDValue = "",
      tonesValue = "",
      notationValue = "",
    }) {
      let sPKey = sIDValue;
      const scaleOption = document.querySelector(`#scaleSelect > option[value=${sPKey}]`);

      const scalePresetInputs = document.createElement("div");
      scalePresetInputs.className = "setting-content";

      const sDN = document.createElement("label");
      const sDNInput = document.createElement("input");
      sDNInput.value = sDNValue;
      sDN.append("Display Name of the Scale:", sDNInput);

      const sID = document.createElement("label");
      const sIDInput = document.createElement("input");
      sIDInput.value = sIDValue;
      sID.append("Identifier for the scale (must be unique):", sIDInput);

      const tones = document.createElement("label");
      const tonesInput = document.createElement("input");
      tonesInput.value = tonesValue;
      tones.append("The tones list:", tonesInput);

      const notation = document.createElement("label");
      const notationInput = document.createElement("input");
      notationInput.value = notationValue;
      notation.append("Notation basis:", notationInput);

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "setting-content-delete";
      deleteBtn.textContent = "Delete";
      deleteBtn.addEventListener("click", () => {
        scalePresetInputs.remove();
        delete cfg.scalePresets[sPKey];
        scaleOption.remove();
      });

      scalePresetInputs.append(sDN, sID, tones, notation, deleteBtn);
      scalePresetsAdd.after(scalePresetInputs);

      scalePresetInputs.addEventListener("change", (e) => {
        const inp = e.target;
        switch (inp) {
          case sDNInput:
            cfg.scalePresets[sPKey].displayName = inp.value;
            scaleOption.textContent = inp.value;
            break;
          case sIDInput:
            if (!cfg.scalePresets[inp.value]) {
              cfg.scalePresets[inp.value] = cfg.scalePresets[sPKey];
              delete cfg.scalePresets[sPKey];
              scaleOption.value = inp.value;
              sPKey = inp.value;
            } else {
              inp.value = sPKey;
            }
            break;
          case tonesInput:
            cfg.scalePresets[sPKey].tones = inp.value
              .split(",")
              .map((e) => parseFloat(e.trim()))
              .filter((e) => !isNaN(e))
            ;
            break;
          case notationInput:
            cfg.scalePresets[sPKey].notation = inp.value;
            break;
        }
      });
    }

    function scalePresetsInputsUpdate() {
      for (const [key, value] of Object.entries(cfg.scalePresets)) {
        scalePresetInputsGenerate({
          sDNValue: value.displayName || key,
          sIDValue: key,
          tonesValue: value.tones,
          notationValue: (value.notation !== undefined) ? value.notation : 12,
        });
      }
    }

    scalePresetsInputsUpdate();

    scalePresetsAdd.addEventListener("click", () => {
      let sIDValue = "New_Scale";
      while (cfg.scalePresets[sIDValue]) {
        sIDValue += "_";
      }
      cfg.scalePresets[sIDValue] = {};
      const option = document.createElement("option");
      option.value = sIDValue;
      option.textContent = "New Scale";
      scaleSelect.append(option);
      scalePresetInputsGenerate({
        sDNValue: option.textContent,
        sIDValue,
      });
    });

    HTMLElement.prototype.removeNext = function() {
      while (this.nextSibling) {
        this.nextSibling.remove();
      }
    }

    scalePresetsReset.addEventListener("click", () => {
      scalePresetsAdd.removeNext();
      cfg.scalePresets = {};
      scaleSelect.replaceChildren();
      localStorage.removeItem("cfg.scalePresets");
    });
    // ]

    // Static Inputs [
    basicSettingsInputs.addEventListener("change", (e) => {
      const inp = e.target;
      switch (inp) {
        case baseFreqInput:
          cfg.baseFreq = parseFloat(inp.value);
          localStorage.setItem("cfg.baseFreq", cfg.baseFreq);
          break;
        case baseOctaveInput:
          cfg.baseOctave = parseInt(inp.value);
          localStorage.setItem("cfg.baseOctave", cfg.baseOctave);
          break;
        case numOctavesInput:
          cfg.numOctaves = parseInt(inp.value);
          localStorage.setItem("cfg.numOctaves", cfg.numOctaves);
          break;
      }
    });
    // ]

    function exportJSON(btn, obj, filename) {
      const file = new Blob([JSON.stringify(obj, null, 2)], {
        type: "application/json",
      });
      const url = URL.createObjectURL(file);
      btn.href = url;
      btn.download = filename || "export.json";
      btn.click();
      URL.revokeObjectURL(url);
    }

    // Ex/import configs [
    exportAll.addEventListener("click", function() {
      exportJSON(this, cfg, "all_configs.json");
    });
    // ]

    settingsDialog.addEventListener("close", () => {
      renderPad(scaleSelect.value);
      localStorage.setItem("cfg.scalePresets", JSON.stringify(cfg.scalePresets));
    });

    /// ]
  </script>
</body>
</html>
