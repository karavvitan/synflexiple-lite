<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>synflexiple</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; background: #111; font-family: sans-serif; overflow: hidden;
    }
    body { display: flex; }
    #scrollbarZone { width: 60px; background: #222; overflow-y: scroll; }
    #scrollbarZone > div { width: 1px; }
    #bottomOptions {
      position: absolute; bottom: 10px; left: 40px; z-index: 10;
    }
    #scaleSelect { font-size: 0.9em; padding: 2px; }
    #padContainer {
      flex: 1; position: relative; overflow: hidden; height: 100%;
    }
    .noteOverlay {
      position: absolute; width: 100%; display: flex; flex-direction: column-reverse;
      pointer-events: none; z-index: 0; transform: translateY(0px);
    }
    .octave-row {
      flex: none; display: flex; border-top: solid 1px; border-bottom: solid 1px; height: var(--rowHeight);
    }
    .note-zone {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 0.8em; color: white;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .pad {
      position: absolute; left: 0; width: 100%; height: 100%;
      touch-action: none; z-index: 1;
    }

    /* SETTINGS UI [ */
    :root {
      --color-base-300: oklch(20% 0 49.25);
      --color-base-content: oklch(92% 0.003 48.717);
      --color-primary: oklch(41% 0.14 257);
      --color-secondary: oklch(34.5% 0.163 344.600);
      --color-error: oklch(50% 0.213 27.518);
    }

    .settings {
      display: flex;
      flex-flow: column wrap;
      gap: 0.75rem;
      border: solid var(--color-base-300) 0.25rem;
      border-radius: 0;
      width: 100;
      padding-bottom: 0.75rem;
      color: var(--color-base-content);
      background-color: var(--color-base-300);

      * {
        border-radius: 0.25rem;
      }

      input {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background-image: none;
        background-color: transparent;
        box-shadow: none;
        font-family: inherit;
        font-size: 100%;
        font-weight: bold;
        color: inherit;
        width: 100;
      }
      input:focus {
        outline: none;
        color: var(--color-base-300);
        background-color: var(--color-base-content);
      }

      label {
        display: flex;
        flex-flow: column wrap;
      }

      button {
        color: var(--color-base-content);
        background-color: var(--color-base-300);
      }

      .btn-close {
        width: 2rem;
        padding: 0.25rem;
        position: absolute;
        top: 0.25rem;
        right: 0.25rem;
        border: none;
        border-radius: 0;
      }
    }

    .settings-header {
      display: flex;
      flex-flow: column wrap;
      background-color: var(--color-primary);
      padding: 0.5rem;
    }

    .settings-heading {
      margin: 0;
      padding: 0.25rem;
      text-align: center;
    }

    .settings-header-buttons {
      display: flex;
      flex-flow: row wrap;
      justify-content: space-around;
      button {
        height: 1.25rem;
      }
    }

    .a_setting {
      background-color: var(--color-secondary);
    }

    .setting-header {
      display: flex;
      flex-flow: row wrap;
      gap: 0.5rem;
      align-items: center;
      min-height: 2rem;

      & > * {
        margin: 0;
      }

      & > button {
        height: 1.25rem;
      }
    }

    .setting-name {
      padding: 0.25rem;
      align-self: flex-start;
    }

    .setting-contents {
      display: flex;
      flex-flow: column wrap;
      padding: 0.5rem;
      gap: 0.75rem;

      & > button {
        font-size: 1.25rem;
      }
    }

    .setting-content {
      display: flex;
      flex-flow: column wrap;
      gap: 0.25rem;
      padding: 0.25rem;
      background-color: var(--color-primary);
    }

    .setting-content-delete {
      background-color: var(--color-error);
      height: 2rem;
    }

    .settings-dialog {
      z-index: 20;
      margin: 0;
      padding: 0;
      border: none;
      width: 100%;
      position: fixed;
      top: 0;
    }
    /* ] */
  </style>
</head>
<body>
  <div id="scrollbarZone"></div>
  <div id="bottomOptions">
    <select id="scaleSelect">
      <option value="minor">Minor</option>
      <option value="minorRatio">Minor Ratio</option>
    </select>
    <button onclick="settingsDialog.show()">⚙️</button>
  </div>
    <dialog class="settings-dialog" closedby="closerequest">
    <div class="settings">
      <button onclick="settingsDialog.close()" class="btn-close">❌</button>
      <div class="settings-header">
        <h2 class="settings-heading">Settings<hr></h2>
        <div class="settings-header-buttons">
          <button>Save all as JSON</button>
          <button>Load all from JSON</button>
        </div>
      </div>
      <div class="a_setting">
        <div class="setting-header">
          <h4 class="setting-name">scalePresets</h4>
          <button>Save as JSON</button>
          <button>Load from JSON</button>
        </div>
        <div class="setting-contents">
          <div class="setting-content">
            <label class="scaleDisplayName">
              Display Name of the scale:
              <input type="text">
            </label>
            <label class="scaleId">
              JavaScript identifier of the scale:
              <input type="text">
            </label>
            <button class="setting-content-delete">Delete</button>
          </div>
          <button>➕</button>
          <button>Reset</button>
        </div>
      </div>

      <div class="a_setting">
        <div class="setting-header">
          <h4 class="setting-name">Base Settings</h4>
          <button>Save as JSON</button>
          <button>Load from JSON</button>
        </div>
        <div class="setting-contents">
          <div class="setting-content">
            <label>
              baseFrequency:
              <input type="text" id="baseFrequencyInput">
            </label>
            <label>
              baseOctave:
              <input type="text" id="baseOctaveInput">
            <label>
              numOctaves:
              <input type="text" id="numOctavesInput">
            </label>
          </div>
        </div>
      </div>
    </div>
  </dialog>

  <div id="padContainer"></div>

  <script>
    const scalePresets = {
      minor: [12, [0, 2, 3, 5, 7, 8, 10]],
      minorRatio: [0, [1/1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5]],
    };

    let baseFreq = 261.63;
    let baseOctave = -1;
    let numOctaves = 4;
    let rowHeight = 120;
    document.documentElement.style.setProperty("--rowHeight", rowHeight + "px");

    const container = document.getElementById("padContainer");
    const scaleSelect = document.getElementById("scaleSelect");
    const scrollbarZone = document.getElementById("scrollbarZone");
    const settingsDialog = document.querySelector(".settings-dialog");

    function getFreqFromXY(x, y, width, height, ET, scale, minOct, maxOct) {
      const octaveHeight = height / (maxOct - minOct + 1);
      const octaveIndex = maxOct - Math.floor(y / octaveHeight);
      const octaveY = y % octaveHeight;
      const yVolume = 1 - (octaveY / octaveHeight);

      const index = Math.floor(x / width * scale.length);
      const safeIndex = Math.max(0, Math.min(index, scale.length - 1));
      const ratio = ET === 0 ? scale[safeIndex] : Math.pow(2, scale[safeIndex] / ET);
      const freq = baseFreq * ratio * Math.pow(2, octaveIndex);
      return { freq: freq, volume: yVolume };
    }

    function applyEnvelope(gainNode, audioCtx, volume, attack = 0.05, decay = 0.1, sustain = 0.7, release = 0.9) {
      const now = audioCtx.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(volume, now + attack);
      gainNode.gain.linearRampToValueAtTime(volume * sustain, now + attack + decay);
      return () => {
        const stopTime = audioCtx.currentTime;
        gainNode.gain.cancelScheduledValues(stopTime);
        gainNode.gain.setValueAtTime(gainNode.gain.value, stopTime);
        gainNode.gain.linearRampToValueAtTime(0, stopTime + release);
      };
    }

    function generateImpulseResponse(audioCtx, duration = 0.01, decay = 0.01) {
      const rate = audioCtx.sampleRate;
      const length = rate * duration;
      const impulse = audioCtx.createBuffer(2, length, rate);
      for (let ch = 0; ch < 2; ch++) {
        const channelData = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
        }
      }
      return impulse;
    }

    function renderPad(scaleName) {
      const ET = scalePresets[scaleName][0];
      const scale = scalePresets[scaleName][1];
      container.innerHTML = "";

      const pad = document.createElement("div");
      pad.className = "pad";

      const overlay = document.createElement("div");
      overlay.className = "noteOverlay";

      for (let o = 0; o < numOctaves; o++) {
        const octaveRow = document.createElement("div");
        octaveRow.className = "octave-row";
        for (let i = 0; i < scale.length; i++) {
          const note = document.createElement("div");
          note.className = "note-zone";
          const tone = scale[i];
          const hue = ET === 0 ? tone * 360 : (tone / ET) * 360;
          note.style.backgroundColor = `hsl(${hue}, 70%, 55%)`;
          note.textContent = +tone.toFixed(3);
          octaveRow.appendChild(note);
        }
        overlay.appendChild(octaveRow);
      }

      overlay.style.transform = "translateY(0px)";
      container.appendChild(overlay);
      container.appendChild(pad);

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const reverb = audioCtx.createConvolver();
      reverb.buffer = generateImpulseResponse(audioCtx);
      reverb.normalize = true;

      const masterGain = audioCtx.createGain();
      masterGain.gain.value = 25;

      masterGain.connect(reverb);
      reverb.connect(audioCtx.destination);

      const activeVoices = new Map();

      pad.addEventListener("pointerdown", e => {
        audioCtx.resume();
        const id = e.pointerId;
        const rect = pad.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top + scrollbarZone.scrollTop;
        const { freq, volume } = getFreqFromXY(x, y, rect.width, rowHeight * numOctaves, ET, scale, baseOctave, baseOctave + numOctaves - 1);

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(500 + y * 4, audioCtx.currentTime);

        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.value = 0;
        lfoGain.gain.value = 1;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);

        osc.start();
        lfo.start();

        const release = applyEnvelope(gain, audioCtx, volume);
        activeVoices.set(id, { osc, gain, lfo, release });
      });

      pad.addEventListener("pointerup", e => {
        const id = e.pointerId;
        const voice = activeVoices.get(id);
        if (voice) {
          voice.release();
          voice.osc.stop(audioCtx.currentTime + 1);
          voice.lfo.stop(audioCtx.currentTime + 1);
          activeVoices.delete(id);
        }
      });

      pad.addEventListener("pointermove", e => {
        const id = e.pointerId;
        const voice = activeVoices.get(id);
        if (voice && e.pressure > 0) {
          const rect = pad.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top + scrollbarZone.scrollTop;
          const { freq, volume } = getFreqFromXY(x, y, rect.width, rowHeight * numOctaves, ET, scale, baseOctave, baseOctave + numOctaves - 1);
          voice.osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          voice.gain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05);
        }
      });
    }

    scrollbarZone.innerHTML = '<div style="height:' + (rowHeight * numOctaves) + 'px;"></div>';
    scrollbarZone.addEventListener("scroll", () => {
      const scrollY = scrollbarZone.scrollTop;
      const overlay = container.querySelector(".noteOverlay");
      if (overlay) overlay.style.transform = `translateY(${-scrollY}px)`;
    });

    scaleSelect.addEventListener("change", () => {
      renderPad(scaleSelect.value);
    });

    renderPad("minor");
  </script>
</body>
</html>
